name: Ruff

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Ruff
        uses: astral-sh/ruff-action@v3.5.1
        with:
          version: "0.14.11"
          args: check .

  auto-fix:
    needs: lint
    if: ${{ always() && needs.lint.result == 'failure' && github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name != 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.ref_name }}

      - name: Ruff
        uses: astral-sh/ruff-action@v3.5.1
        with:
          version: "0.14.11"
          args: check --fix .

      - name: Commit and push Ruff fixes
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: apply Ruff auto-fixes"
          git push origin HEAD:${{ github.ref_name }}
